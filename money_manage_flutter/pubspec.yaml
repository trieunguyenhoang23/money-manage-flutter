name: money_manage_flutter
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # UI
  flutter_screenutil: ^5.9.3
  auto_size_text_plus: ^3.0.2
  fluttertoast: ^9.0.0
  percent_indicator: ^4.2.5
  google_fonts: ^8.0.2
  loading_animation_widget: ^1.3.0
  lottie: ^3.3.2
  flutter_svg: ^2.2.4
  extended_nested_scroll_view: ^6.2.1
  extended_image: ^9.1.0
  flutter_slidable: ^4.0.3

  # Monitoring & Analytics
  firebase_core: 4.5.0
  firebase_analytics: 12.1.3
  firebase_crashlytics: 5.0.8
  firebase_remote_config: 6.2.0

  # Notification
  firebase_messaging: 16.1.2
  flutter_local_notifications: ^20.1.0

  # Social Auth
  google_sign_in: ^7.2.0

  # Network
  dio: 5.9.2
  dio_cache_interceptor_hive_store: 4.0.0
  dio_smart_retry: 7.0.1

  # Platform Service
  connectivity_plus: 7.0.0
  path_provider: ^2.1.5
  workmanager: ^0.9.0+3

  # State Manager
  flutter_hooks: 0.21.3+1
  hooks_riverpod: 3.2.1

  # DI
  injectable: 2.7.1+4
  get_it: ^9.2.1

  # Local Database
  isar_community: ^3.3.0
  isar_community_flutter_libs: ^3.3.0

  # Local Storage
  shared_preferences: ^2.5.4

  # Secure Storage
  flutter_secure_storage: ^10.0.0

  # Navigation
  go_router: ^17.1.0

  # Utils
  dartz: ^0.10.1
  uuid: ^4.5.3
  tuple: ^2.0.2

  # Image
  file_picker: 10.3.7
  image_picker: 1.2.1
  image_cropper: ^11.0.0
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  injectable_generator: 2.8.1
  isar_community_generator: 3.3.0
  build_runner: 2.7.1

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/

flutter_intl:
  enabled: true
  arb_dir: lib/shared/l10n
  output_dir: lib/generated

